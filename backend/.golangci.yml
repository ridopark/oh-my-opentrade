# golangci-lint v2 configuration for oh-my-opentrade backend
# Go 1.24 production codebase with hexagonal architecture
version: "2"

run:
  go: '1.24'
  timeout: 3m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive
    - misspell
    - prealloc
    - errorlint
    - bodyclose
    - noctx

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - fmt.Print
        - fmt.Println
        - fmt.Printf
        - fmt.Fprintf
        - (fmt.Stringer).String
        - io.Copy
        - (*strings.Builder).WriteString
        - (*strings.Builder).WriteRune
        - (*strings.Builder).WriteByte

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

    revive:
      enable-all-rules: false
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: superfluous-else
        - name: time-naming
        - name: unexported-naming
        - name: unexported-return
        - name: unnecessary-stmt
        - name: unreachable-code
        - name: var-declaration

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - exitAfterDefer

    misspell:
      locale: US

    prealloc:
      simple: true
      range-loops: true
      for-loops: true

    errorlint:
      errorf: true
      asserts: true
      comparison: true

  exclusions:
    generated: lax
    paths:
      - bin
      - vendor
      - ".*_test\\.go$"
      - ".*_mock\\.go$"
    rules:
      - linters:
          - revive
        text: "unused-parameter"
        source: "func \\(.*\\) .*\\(.*\\) error"

      - linters:
          - revive
        text: "blank-imports"
        source: "_ \".*\""

      - linters:
          - noctx
        source: "context\\.Background\\(\\)"

      - path: "_test\\.go$"
        linters:
          - errcheck

      - source: "// Code generated"
        linters:
          - unused

      - linters:
          - errcheck
        text: "Error return value of `.*\\.Close` is not checked"

      - linters:
          - errcheck
        text: "Error return value of `.*\\.CloseNow` is not checked"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
