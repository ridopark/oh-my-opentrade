# oh-my-opentrade configuration
# Copy this file to configs/config.yaml and customize

alpaca:
  # API credentials are loaded from .env (APCA_API_KEY_ID, APCA_API_SECRET_KEY)
  # Separate data credentials: APCA_DATA_API_KEY_ID, APCA_DATA_API_SECRET_KEY
  base_url: "https://paper-api.alpaca.markets"
  data_url: "https://data.alpaca.markets"
  crypto_data_url: "wss://stream.data.alpaca.markets"
  crypto_feed: "us"
  paper_mode: true

database:
  host: "localhost"
  port: 5432
  user: "opentrade"
  # Password is loaded from .env (TIMESCALEDB_PASSWORD)
  dbname: "opentrade"
  ssl_mode: "disable"
  max_pool_size: 10

trading:
  max_risk_percent: 2.0
  default_slippage_bps: 10
  kill_switch_max_stops: 3
  kill_switch_window: "2m"
  kill_switch_halt_duration: "15m"
  max_daily_loss_pct: 5.0           # halt trading if daily loss exceeds 5% of equity
  max_daily_loss_usd: 5000           # halt trading if daily loss exceeds $5000

symbols:
  groups:
    - asset_class: "EQUITY"
      symbols:
        - "AAPL"
        - "MSFT"
        - "GOOGL"
        - "AMZN"
        - "TSLA"
        - "SOXL"
        - "U"
        - "PLTR"
        - "SPY"
        - "META"
      timeframe: "1m"
    - asset_class: "CRYPTO"
      symbols:
        - "BTC/USD"
        - "ETH/USD"
        - "SOL/USD"
        - "AVAX/USD"
        - "DOGE/USD"
        - "PEPE/USD"
      timeframe: "1m"

server:
  port: 8080
  log_level: "info"

ai:
  base_url: "http://localhost:11434"  # any OpenAI-compatible endpoint (Ollama, LM Studio, OpenAI, vLLM)
  model: "gpt-4o-mini"               # model name to request
  # api_key: loaded from env LLM_API_KEY (required for OpenAI, OpenRouter, etc.)
  min_confidence: 0.6
  enabled: false

notification:
  # telegram_bot_token: loaded from env TELEGRAM_BOT_TOKEN
  # telegram_chat_id: loaded from env TELEGRAM_CHAT_ID
  # discord_webhook_url: loaded from env DISCORD_WEBHOOK_URL
