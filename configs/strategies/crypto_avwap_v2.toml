schema_version = 2

[strategy]
id = "crypto_avwap_v2"
version = "2.0.0"
name = "AVWAP Breakout/Bounce v2 (Crypto)"
description = "Anchored VWAP strategy with volatility-adaptive exits — long-only for crypto pairs"
author = "system"
created_at = "2026-03-08T00:00:00Z"

[lifecycle]
state = "PaperActive"
paper_only = true

[routing]
symbols = ["BTC/USD", "ETH/USD"]
timeframes = ["1m"]
priority = 70
conflict_policy = "priority_wins"
exclusive_per_symbol = false
watchlist_mode = "replace"
asset_classes = ["CRYPTO"]
allowed_directions = ["LONG"]

[screening]
description = "Anchored VWAP strategy for crypto with spread protection and higher-lows confirmation. Enters on VWAP breakouts or bounces when price structure confirms accumulation. Ideal candidates have tight bid-ask spreads, respect for key VWAP anchors (previous-day high/low, session open), and sufficient volume for reliable VWAP calculation. Favors established crypto pairs with institutional participation. Avoid illiquid altcoins with wide spreads."

[params]
anchors = ["pd_high", "pd_low", "on_high", "on_low", "session_open"]
breakout_enabled = true
hold_bars = 3
volume_mult = 2.0
bounce_enabled = true
rsi_bounce_max = 30.0
exit_hold_bars = 2
cooldown_seconds = 120
max_trades_per_day = 5
allow_regimes = ["REVERSAL"]
direction = "LONG"
asset_class = "CRYPTO"
require_higher_lows = true
higher_lows_bars = 3
midday_trap_shield = false
stop_bps = 60
limit_offset_bps = 15
limit_offset_bps_offhours = 30
max_slippage_bps = 20
max_slippage_bps_offhours = 40
risk_per_trade_bps = 100
max_position_bps = 500
max_spread_bps = 25

[regime_filter]
enabled = false
allowed_regimes = ["BALANCE", "REVERSAL"]
min_atr_pct = 0.8

[hooks]
signals = { engine = "builtin", name = "avwap_v1" }

[dynamic_risk]
enabled = true
min_confidence = 0.70
risk_scale_min = 0.50
risk_scale_max = 1.00
stop_tight_mult = 0.70
stop_wide_mult = 1.50
size_tight_mult = 0.70
size_wide_mult = 1.20

[[exit_rules]]
type = "VOLATILITY_STOP"
[exit_rules.params]
atr_multiplier = 2.5

[[exit_rules]]
type = "SD_TARGET"
[exit_rules.params]
sd_level = 2.0

[[exit_rules]]
type = "STEP_STOP"
[exit_rules.params]

[[exit_rules]]
type = "STAGNATION_EXIT"
[exit_rules.params]
minutes = 75
sd_threshold = 1.5
profit_gate_pct = 0.005

[[exit_rules]]
type = "MAX_HOLDING_TIME"
[exit_rules.params]
minutes = 240

[[exit_rules]]
type = "MAX_LOSS"
[exit_rules.params]
pct = 0.03
