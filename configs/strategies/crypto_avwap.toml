schema_version = 2

[strategy]
id = "avwap_v1"
version = "1.0.0"
name = "AVWAP Breakout/Bounce (Crypto)"
description = "Anchored VWAP breakout and bounce strategy — long-only for crypto pairs"
author = "system"
created_at = "2026-03-05T00:00:00Z"

[lifecycle]
state = "LiveActive"
paper_only = false

[routing]
symbols = ["BTC/USD", "BTC/USDT", "ETH/USD", "SOL/USD", "AVAX/USD", "DOGE/USD", "PEPE/USD"]
timeframes = ["1m"]
priority = 70
conflict_policy = "priority_wins"
exclusive_per_symbol = false
watchlist_mode = "intersection"
asset_classes = ["CRYPTO"]

[params]
anchors = ["pd_high", "pd_low", "on_high", "on_low", "session_open"]
breakout_enabled = true
hold_bars = 2
volume_mult = 1.5
bounce_enabled = true
rsi_bounce_max = 30.0
exit_hold_bars = 2
cooldown_seconds = 120
max_trades_per_day = 5
allow_regimes = ["BALANCE", "REVERSAL"]
direction = "LONG"
stop_bps = 30
limit_offset_bps = 5
risk_per_trade_bps = 10
max_position_bps = 1000

[regime_filter]
enabled = false
allowed_regimes = ["BALANCE", "REVERSAL"]
min_atr_pct = 0.8

[hooks]
signals = { engine = "builtin", name = "avwap_v1" }

[[exit_rules]]
type = "TRAILING_STOP"
[exit_rules.params]
pct = 0.02

[[exit_rules]]
type = "PROFIT_TARGET"
[exit_rules.params]
pct = 0.03

[[exit_rules]]
type = "MAX_HOLDING_TIME"
[exit_rules.params]
minutes = 240

[[exit_rules]]
type = "MAX_LOSS"
[exit_rules.params]
pct = 0.05