schema_version = 2

[strategy]
id = "crypto_avwap_v2_alts"
version = "2.0.0"
name = "AVWAP Breakout/Bounce v2 (Crypto Alts)"
description = "Anchored VWAP strategy with tighter risk params for higher-volatility altcoins"
author = "system"
created_at = "2026-03-11T00:00:00Z"

[lifecycle]
state = "PaperActive"
paper_only = true

[routing]
symbols = ["SOL/USD", "AVAX/USD", "DOGE/USD", "PEPE/USD"]
timeframes = ["1m"]
priority = 65
conflict_policy = "priority_wins"
exclusive_per_symbol = false
watchlist_mode = "replace"
asset_classes = ["CRYPTO"]
allowed_directions = ["LONG"]

[screening]
description = "Anchored VWAP strategy for higher-volatility altcoins with tighter risk controls. Same signal logic as crypto_avwap_v2 but with reduced ATR multiplier (1.5x vs 2.5x), smaller position caps, and wider spread tolerance for altcoin microstructure. Only trades REVERSAL regimes."

[params]
anchors = ["pd_high", "pd_low", "on_high", "on_low", "session_open"]
breakout_enabled = true
hold_bars = 3
volume_mult = 2.0
bounce_enabled = true
rsi_bounce_max = 30.0
exit_hold_bars = 2
cooldown_seconds = 180
max_trades_per_day = 3
allow_regimes = ["REVERSAL"]
direction = "LONG"
asset_class = "CRYPTO"
require_higher_lows = true
higher_lows_bars = 3
midday_trap_shield = false
stop_bps = 80
limit_offset_bps = 20
limit_offset_bps_offhours = 40
max_slippage_bps = 30
max_slippage_bps_offhours = 50
risk_per_trade_bps = 75
max_position_bps = 300
max_spread_bps = 40

[regime_filter]
enabled = false
allowed_regimes = ["REVERSAL"]
min_atr_pct = 0.8

[hooks]
signals = { engine = "builtin", name = "avwap_v1" }

[dynamic_risk]
enabled = true
min_confidence = 0.70
risk_scale_min = 0.50
risk_scale_max = 1.00
stop_tight_mult = 0.70
stop_wide_mult = 1.50
size_tight_mult = 0.70
size_wide_mult = 1.20

[[exit_rules]]
type = "VOLATILITY_STOP"
[exit_rules.params]
atr_multiplier = 1.5

[[exit_rules]]
type = "SD_TARGET"
[exit_rules.params]
sd_level = 2.0

[[exit_rules]]
type = "STEP_STOP"
[exit_rules.params]

[[exit_rules]]
type = "STAGNATION_EXIT"
[exit_rules.params]
minutes = 75
sd_threshold = 1.5
profit_gate_pct = 0.005

[[exit_rules]]
type = "MAX_HOLDING_TIME"
[exit_rules.params]
minutes = 180

[[exit_rules]]
type = "MAX_LOSS"
[exit_rules.params]
pct = 0.025
