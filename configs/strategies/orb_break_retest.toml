schema_version = 2

[strategy]
id = "orb_break_retest"
version = "1.0.0"
name = "ORB Break & Retest"
description = "Opening Range Breakout — Break & Retest with volume confirmation"
author = "system"
created_at = "2026-03-04T00:00:00Z"

[lifecycle]
state = "LiveActive"
paper_only = false

[routing]
symbols = ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "SOXL", "U", "PLTR", "SPY", "META"]
timeframes = ["1m"]
priority = 100
conflict_policy = "priority_wins"
exclusive_per_symbol = false
watchlist_mode = "intersection"

[params]
orb_window_minutes = 30
min_rvol = 0.5
min_confidence = 0.40
breakout_confirm_bps = 2
touch_tolerance_bps = 2
hold_confirm_bps = 0
max_retest_bars = 15
allow_missing_bars = 1
max_signals_per_session = 1
stop_bps = 25
limit_offset_bps = 5
risk_per_trade_bps = 10
max_position_bps = 1000

[regime_filter]
enabled = false
allowed_regimes = ["TREND"]
min_atr_pct = 0.8

[hooks]
signals = { engine = "builtin", name = "orb_v1" }

[options]
enabled = false

[options.defaults]
min_dte = 35
max_dte = 45
target_delta_low = 0.40
target_delta_high = 0.55
min_open_interest = 100
max_spread_pct = 0.10
max_iv = 1.0

[options.regime_overrides.BALANCE]
target_delta_low = 0.30
target_delta_high = 0.45
min_dte = 30
max_dte = 50
