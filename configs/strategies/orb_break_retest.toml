schema_version = 2

[strategy]
id = "orb_break_retest"
version = "1.0.0"
name = "ORB Break & Retest"
description = "Opening Range Breakout — Break & Retest with volume confirmation"
author = "system"
created_at = "2026-03-04T00:00:00Z"

[lifecycle]
state = "LiveActive"
paper_only = false

[routing]
symbols = ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "SOXL", "U", "PLTR", "SPY", "META"]
timeframes = ["1m"]
priority = 100
conflict_policy = "priority_wins"
exclusive_per_symbol = true
watchlist_mode = "intersection"
asset_classes = ["EQUITY"]
allowed_directions = ["LONG"]

[screening]
description = "Opening Range Breakout strategy that waits for price to break the first-hour range, then retests the breakout level before entry. Ideal candidates have a well-defined opening range with strong volume, relative volume above average, and directional conviction from the open. Favors stocks with news catalysts or sector momentum that create decisive opening moves. Avoid symbols with extremely wide opening ranges (high ATR) that make stop placement impractical."

[params]
orb_window_minutes = 60
min_rvol = 0.5
min_confidence = 0.40
breakout_confirm_bps = 2
touch_tolerance_bps = 2
hold_confirm_bps = 0
max_retest_bars = 20
allow_missing_bars = 2
max_signals_per_session = 3
htf_bias_enabled = true
stop_bps = 50
limit_offset_bps = 5
risk_per_trade_bps = 100
max_position_bps = 1000
allowed_hours_start = "10:30"
allowed_hours_end = "15:30"
allowed_hours_tz = "America/New_York"

[regime_filter]
enabled = false
allowed_regimes = ["TREND"]
min_atr_pct = 0.8

[hooks]
signals = { engine = "builtin", name = "orb_v1" }

[options]
enabled = false

[options.defaults]
min_dte = 35
max_dte = 45
target_delta_low = 0.40
target_delta_high = 0.55
min_open_interest = 100
max_spread_pct = 0.10
max_iv = 1.0

[options.regime_overrides.BALANCE]
target_delta_low = 0.30
target_delta_high = 0.45
min_dte = 30
max_dte = 50

[dynamic_risk]
enabled = true
min_confidence = 0.60
risk_scale_min = 0.50
risk_scale_max = 1.00
stop_tight_mult = 0.70
stop_wide_mult = 1.50
size_tight_mult = 0.70
size_wide_mult = 1.20

[[exit_rules]]
type = "TRAILING_STOP"
[exit_rules.params]
pct = 0.02

[[exit_rules]]
type = "PROFIT_TARGET"
[exit_rules.params]
pct = 0.03

[[exit_rules]]
type = "EOD_FLATTEN"
[exit_rules.params]
minutes_before_close = 5

[[exit_rules]]
type = "MAX_LOSS"
[exit_rules.params]
pct = 0.025
