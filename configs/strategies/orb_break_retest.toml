schema_version = 2

[strategy]
id = "orb_break_retest"
version = "1.0.0"
name = "ORB Break & Retest"
description = "Opening Range Breakout — Break & Retest with volume confirmation"
author = "system"
created_at = "2026-03-04T00:00:00Z"

[lifecycle]
state = "PaperActive"
paper_only = true

[routing]
symbols = ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "SOXL", "U", "PLTR", "SPY", "META"]
timeframes = ["5m"]
priority = 100
conflict_policy = "priority_wins"
exclusive_per_symbol = true
watchlist_mode = "replace"
asset_classes = ["CRYPTO", "EQUITY"]
allowed_directions = ["LONG", "SHORT"]

[screening]
description = "Opening Range Breakout strategy that waits for price to break the ORB window(15min) range, then retests the breakout level before entry. CRITICAL: Only pick highly liquid stocks that trade continuously every minute during the first hour — minimum 500K average daily volume, preferably 1M+. Mid and large caps only."

[params]
orb_window_minutes = 15
min_rvol = 1.0
min_confidence = 0.70
breakout_confirm_bps = 5
touch_tolerance_bps = 2
hold_confirm_bps = 0
max_retest_bars = 30
allow_missing_range_bars = 20
max_signals_per_session = 5
htf_bias_enabled = true
atr_multiplier = 3.0
sweep_cooldown_bars = 3
retest_confirm_bars = 2
stop_bps = 50
limit_offset_bps = 5
risk_per_trade_bps = 100
max_position_bps = 700
allowed_hours_start = "09:30"
allowed_hours_end = "15:45"
allowed_hours_tz = "America/New_York"

[regime_filter]
enabled = true
allowed_regimes = ["TREND", "REVERSAL", "BALANCE"]
min_atr_pct = 0.8

[hooks]
signals = { engine = "builtin", name = "orb_break_retest" }

[dynamic_risk]
enabled = true
min_confidence = 0.60
risk_scale_min = 0.50
risk_scale_max = 1.00
stop_tight_mult = 0.60
stop_wide_mult = 1.50
size_tight_mult = 0.70
size_wide_mult = 1.50

[[exit_rules]]
type = "VOLATILITY_STOP"
[exit_rules.params]
atr_multiplier = 5.0
min_hold_bars = 8

[[exit_rules]]
type = "SD_TARGET"
[exit_rules.params]
sd_level = 3.0
min_hold_bars = 10

[[exit_rules]]
type = "EOD_FLATTEN"
[exit_rules.params]
minutes_before_close = 5

[[exit_rules]]
type = "MAX_LOSS"
[exit_rules.params]
pct = 0.025

[options]
enabled = true

[options.defaults]
min_dte = 35
max_dte = 45
target_delta_low = 0.40
target_delta_high = 0.55
min_open_interest = 100
max_spread_pct = 0.10
max_iv = 1.0

[options.regime_overrides.BALANCE]
target_delta_low = 0.30
target_delta_high = 0.45
min_dte = 30
max_dte = 50
