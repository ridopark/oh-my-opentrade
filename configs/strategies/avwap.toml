schema_version = 2

[strategy]
id = "avwap_v1"
version = "1.0.0"
name = "AVWAP Breakout/Bounce"
description = "Anchored VWAP breakout and bounce strategy with regime gating"
author = "system"
created_at = "2026-03-05T00:00:00Z"

[lifecycle]
state = "LiveActive"
paper_only = false

[routing]
symbols = ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "SOXL", "U", "PLTR", "SPY", "META"]
timeframes = ["1m"]
priority = 80
conflict_policy = "priority_wins"
exclusive_per_symbol = true
watchlist_mode = "replace"
asset_classes = ["EQUITY"]
allowed_directions = ["LONG"]

[screening]
description = "Anchored VWAP strategy that enters on breakouts above or bounces off key VWAP levels (previous-day high/low, overnight high/low, opening range). Ideal candidates have clear respect for VWAP levels historically, moderate gap with volume to establish new anchor points, and balanced or reversal regimes where VWAP acts as dynamic support/resistance. Avoid low-volume symbols where VWAP is unreliable."

[params]
anchors = ["pd_high", "pd_low", "on_high", "on_low", "or_high", "or_low", "session_open"]
breakout_enabled = true
hold_bars = 3
volume_mult = 2.0
bounce_enabled = true
rsi_bounce_max = 30.0
exit_hold_bars = 2
cooldown_seconds = 120
max_trades_per_day = 3
allow_regimes = ["BALANCE", "REVERSAL"]
stop_bps = 50
limit_offset_bps = 5
risk_per_trade_bps = 100
max_position_bps = 700

[regime_filter]
enabled = true
allowed_regimes = ["BALANCE", "REVERSAL"]
min_atr_pct = 0.8

[hooks]
signals = { engine = "builtin", name = "avwap_v1" }

[dynamic_risk]
enabled = true
min_confidence = 0.70
risk_scale_min = 0.50
risk_scale_max = 1.00
stop_tight_mult = 0.70
stop_wide_mult = 1.50
size_tight_mult = 0.70
size_wide_mult = 1.20

[risk_revaluation]
enabled = true
interval_minutes = 5

[[exit_rules]]
type = "VOLATILITY_STOP"
[exit_rules.params]
atr_multiplier = 1.5

[[exit_rules]]
type = "SD_TARGET"
[exit_rules.params]
sd_level = 2.0

[[exit_rules]]
type = "STEP_STOP"
[exit_rules.params]

[[exit_rules]]
type = "STAGNATION_EXIT"
[exit_rules.params]
minutes = 30
sd_threshold = 1.0
profit_gate_pct = 0.005

[[exit_rules]]
type = "EOD_FLATTEN"
[exit_rules.params]
minutes_before_close = 5

[[exit_rules]]
type = "MAX_LOSS"
[exit_rules.params]
pct = 0.025
