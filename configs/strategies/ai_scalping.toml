schema_version = 2

[strategy]
id = "ai_scalping_v1"
version = "1.0.0"
name = "AI-Enhanced Scalping"
description = "RSI/Stoch mean-reversion with AI async debate overlay"
author = "system"
created_at = "2026-03-05T00:00:00Z"

[lifecycle]
state = "PaperActive"
paper_only = true

[routing]
symbols = ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "SOXL", "U", "PLTR", "SPY", "META"]
timeframes = ["1m"]
priority = 60
conflict_policy = "priority_wins"
exclusive_per_symbol = true
watchlist_mode = "union"
asset_classes = ["EQUITY"]
allowed_directions = ["LONG"]

[screening]
description = "Mean-reversion scalping strategy that buys oversold conditions (low RSI, low Stochastic) and exits at the mean. Needs high liquidity and tight bid-ask spreads to capture small moves profitably. Ideal candidates are large-cap equities with stable price behavior, high average daily volume, and balanced or range-bound market regimes. Avoid trending or gapping symbols — this strategy profits from reversion, not continuation."

[params]
rsi_long = 30.0
rsi_short = 70.0
stoch_long = 20.0
stoch_short = 80.0
rsi_exit_mid = 50.0
allow_regimes = ["BALANCE", "REVERSAL"]
cooldown_seconds = 60
max_trades_per_day = 10
ai_enabled = true
ai_mode = "async_debate_adjust"
ai_timeout_seconds = 3
ai_min_confidence = 0.65
ai_veto_on_strong_opposite = true
size_mult_min = 0.5
size_mult_base = 1.0
size_mult_max = 1.5
stop_bps = 50
limit_offset_bps = 5
risk_per_trade_bps = 100
max_position_bps = 700
allowed_hours_start = "09:30"
allowed_hours_end = "16:00"
allowed_hours_tz = "America/New_York"

[regime_filter]
enabled = true
allowed_regimes = ["BALANCE", "REVERSAL"]
min_atr_pct = 0.8

[hooks]
signals = { engine = "builtin", name = "ai_scalping_v1" }

[dynamic_risk]
enabled = true
min_confidence = 0.70
risk_scale_min = 0.50
risk_scale_max = 0.90
stop_tight_mult = 0.80
stop_wide_mult = 1.30
size_tight_mult = 0.60
size_wide_mult = 1.00

[risk_revaluation]
enabled = true
interval_minutes = 5

[[exit_rules]]
type = "VOLATILITY_STOP"
[exit_rules.params]
atr_multiplier = 1.5

[[exit_rules]]
type = "SD_TARGET"
[exit_rules.params]
sd_level = 1.5

[[exit_rules]]
type = "STEP_STOP"
[exit_rules.params]

[[exit_rules]]
type = "STAGNATION_EXIT"
[exit_rules.params]
minutes = 20
sd_threshold = 1.0
profit_gate_pct = 0.003

[[exit_rules]]
type = "EOD_FLATTEN"
[exit_rules.params]
minutes_before_close = 5

[[exit_rules]]
type = "MAX_LOSS"
[exit_rules.params]
pct = 0.02
