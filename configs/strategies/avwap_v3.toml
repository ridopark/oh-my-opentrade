schema_version = 2
[strategy]
id = "avwap_v3"
version = "3.0.0"
name = "AVWAP v3c - Wide Breakout"
description = "Wide stops, wide targets, fewer but larger trades"
author = "system"
created_at = "2026-03-24T00:00:00Z"
[lifecycle]
state = "PaperActive"
paper_only = true
[routing]
symbols = ["SPY"]
timeframes = ["5m"]
priority = 80
conflict_policy = "priority_wins"
exclusive_per_symbol = true
watchlist_mode = "replace"
asset_classes = ["EQUITY"]
allowed_directions = ["LONG"]
[hooks]
signals = { engine = "builtin", name = "avwap_v1" }
[params]
anchors = ["pd_high", "pd_low", "session_open"]
breakout_enabled = true
hold_bars = 6
volume_mult = 0.0
bounce_enabled = true
rsi_bounce_max = 45.0
exit_hold_bars = 6
cooldown_seconds = 300
max_trades_per_day = 4
allow_regimes = ["TREND", "BALANCE"]
asset_class = "EQUITY"
require_higher_lows = false
midday_trap_shield = true
midday_volume_mult = 2.0
stop_bps = 50
limit_offset_bps = 5
risk_per_trade_bps = 100
max_position_bps = 1000
allowed_hours_start = "09:35"
allowed_hours_end = "15:30"
allowed_hours_tz = "America/New_York"
[dynamic_risk]
enabled = false
[[exit_rules]]
type = "VOLATILITY_STOP"
[exit_rules.params]
atr_multiplier = 4.0
min_hold_bars = 6
bar_minutes = 5
[[exit_rules]]
type = "SD_TARGET"
[exit_rules.params]
sd_level = 2.0
min_hold_bars = 8
bar_minutes = 5
[[exit_rules]]
type = "EOD_FLATTEN"
[exit_rules.params]
minutes_before_close = 15
[[exit_rules]]
type = "MAX_LOSS"
[exit_rules.params]
pct = 0.025
