schema_version = 2

[strategy]
id = "crypto_ai_scalping_v1"
version = "1.0.0"
name = "AI-Enhanced Scalping (Crypto)"
description = "RSI/Stoch mean-reversion with AI async debate overlay — tuned for crypto volatility"
author = "system"
created_at = "2026-03-10T00:00:00Z"

[lifecycle]
state = "PaperActive"
paper_only = true

[routing]
symbols = ["BTC/USD", "ETH/USD", "SOL/USD", "AVAX/USD", "DOGE/USD", "PEPE/USD"]
timeframes = ["1m"]
priority = 60
conflict_policy = "priority_wins"
exclusive_per_symbol = false
watchlist_mode = "union"
asset_classes = ["CRYPTO"]
allowed_directions = ["LONG"]

[screening]
description = "Mean-reversion scalping tuned for crypto volatility. Buys oversold conditions and exits at the mean. Needs crypto pairs with tight spreads and deep liquidity during US trading hours. Ideal candidates show range-bound behavior with clear support/resistance, high 24h volume relative to peers, and stable funding rates. Avoid trending crypto with parabolic moves — this strategy profits from oscillation, not momentum."

[params]
rsi_long = 25.0
rsi_short = 75.0
stoch_long = 15.0
stoch_short = 85.0
rsi_exit_mid = 50.0
allow_regimes = ["BALANCE", "REVERSAL"]
cooldown_seconds = 90
max_trades_per_day = 10
ai_enabled = true
ai_mode = "async_debate_adjust"
ai_timeout_seconds = 3
ai_min_confidence = 0.65
ai_veto_on_strong_opposite = true
size_mult_min = 0.5
size_mult_base = 1.0
size_mult_max = 1.5
stop_bps = 80
limit_offset_bps = 15
limit_offset_bps_offhours = 30
max_slippage_bps = 20
max_slippage_bps_offhours = 40
risk_per_trade_bps = 100
max_position_bps = 1000
max_spread_bps = 40
allowed_hours_start = "08:00"
allowed_hours_end = "17:00"
allowed_hours_tz = "America/New_York"
skip_weekends = true

[regime_filter]
enabled = false
allowed_regimes = ["BALANCE", "REVERSAL"]
min_atr_pct = 0.8

[hooks]
signals = { engine = "builtin", name = "ai_scalping_v1" }

[dynamic_risk]
enabled = true
min_confidence = 0.60
risk_scale_min = 0.50
risk_scale_max = 0.90
stop_tight_mult = 0.80
stop_wide_mult = 1.30
size_tight_mult = 0.60
size_wide_mult = 1.00

[risk_revaluation]
enabled = true
interval_minutes = 5

[[exit_rules]]
type = "VOLATILITY_STOP"
[exit_rules.params]
atr_multiplier = 2.5

[[exit_rules]]
type = "SD_TARGET"
[exit_rules.params]
sd_level = 1.5

[[exit_rules]]
type = "STEP_STOP"
[exit_rules.params]

[[exit_rules]]
type = "STAGNATION_EXIT"
[exit_rules.params]
minutes = 30
sd_threshold = 1.0
profit_gate_pct = 0.005

[[exit_rules]]
type = "MAX_HOLDING_TIME"
[exit_rules.params]
minutes = 120

[[exit_rules]]
type = "MAX_LOSS"
[exit_rules.params]
pct = 0.03
