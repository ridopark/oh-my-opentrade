schema_version = 2

[strategy]
id = "crypto_ai_scalping_v1"
version = "1.0.0"
name = "AI-Enhanced Scalping (Crypto)"
description = "RSI/Stoch mean-reversion with AI async debate overlay — tuned for crypto volatility"
author = "system"
created_at = "2026-03-10T00:00:00Z"

[lifecycle]
state = "PaperActive"
paper_only = true

[routing]
symbols = ["BTC/USD", "ETH/USD", "SOL/USD", "AVAX/USD", "DOGE/USD", "PEPE/USD"]
timeframes = ["1m"]
priority = 60
conflict_policy = "priority_wins"
exclusive_per_symbol = false
watchlist_mode = "intersection"
asset_classes = ["CRYPTO"]

[params]
rsi_long = 30.0
rsi_short = 70.0
stoch_long = 20.0
stoch_short = 80.0
rsi_exit_mid = 50.0
allow_regimes = ["BALANCE", "REVERSAL"]
cooldown_seconds = 90
max_trades_per_day = 10
ai_enabled = true
ai_mode = "async_debate_adjust"
ai_timeout_seconds = 3
ai_min_confidence = 0.65
ai_veto_on_strong_opposite = true
size_mult_min = 0.5
size_mult_base = 1.0
size_mult_max = 1.5
stop_bps = 45
limit_offset_bps = 8
risk_per_trade_bps = 10
max_position_bps = 1000

[regime_filter]
enabled = false
allowed_regimes = ["BALANCE", "REVERSAL"]
min_atr_pct = 0.8

[hooks]
signals = { engine = "builtin", name = "ai_scalping_v1" }

[dynamic_risk]
enabled = true
min_confidence = 0.60
risk_scale_min = 0.50
risk_scale_max = 1.00
stop_tight_mult = 0.70
stop_wide_mult = 1.50
size_tight_mult = 0.70
size_wide_mult = 1.20

[risk_revaluation]
enabled = true
interval_minutes = 5
