schema_version = 2

[strategy]
id = "break_retest_v1"
version = "1.0.0"
name = "Break & Retest"
description = "Structural breakout with retest confirmation, Fibonacci confluence, and market structure trend filter"
author = "system"
created_at = "2026-03-10T00:00:00Z"

[lifecycle]
state = "PaperActive"
paper_only = true

[routing]
symbols = ["BTC/USD", "ETH/USD", "SOL/USD", "AVAX/USD", "DOGE/USD", "PEPE/USD", "AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "SOXL", "U", "PLTR", "SPY", "META", "NVDA"]
timeframes = ["5m"]
priority = 100
conflict_policy = "priority_wins"
exclusive_per_symbol = true
watchlist_mode = "replace"
asset_classes = ["CRYPTO", "EQUITY"]

[screening]
description = "Structural breakout strategy that enters when price breaks above a key pivot high with strong volume confirmation, then waits for a controlled pullback to retest the broken level as support. Ideal candidates show elevated relative volume (RVOL > 1.5), clean multi-bar pivot structures, and a pre-market gap indicating institutional interest. Favors trending regimes with expanding ATR."

[params]
pivot_lookback = 3
vol_surge_mult = 1.0
body_range_ratio = 0.3
atr_breakout_mult = 0.7
breakout_buffer_atr = 0.4
max_wick_ratio = 0.7
retest_band_atr = 0.4
retest_expiry_bars = 50
invalidation_atr = 1.0
fib_confluence_atr = 0.4
engulf_body_mult = 1.0
stop_mode = "retest_low"
tp1_mode = "breakout_peak"
tp2_mode = "fib_1618_ext"
min_rr_ratio = 1.0
stop_bps = 50
limit_offset_bps = 5
risk_per_trade_bps = 100
max_position_bps = 1000
ai_enabled = true
ai_timeout_seconds = 5
ai_min_confidence = 0.65
size_mult_min = 0.5
size_mult_base = 1.0
size_mult_max = 1.5
cooldown_seconds = 120
max_trades_per_day = 10
ema_fast = 20
ema_slow = 50

[regime_filter]
enabled = false
allowed_regimes = ["TREND", "BALANCE", "REVERSAL"]
min_atr_pct = 0.5

[hooks]
signals = { engine = "builtin", name = "break_retest_v1" }

[dynamic_risk]
enabled = true
min_confidence = 0.60
risk_scale_min = 0.50
risk_scale_max = 1.00
stop_tight_mult = 0.60
stop_wide_mult = 1.50
size_tight_mult = 0.70
size_wide_mult = 1.50

[risk_revaluation]
enabled = true
interval_minutes = 5

[[exit_rules]]
type = "VOLATILITY_STOP"
[exit_rules.params]
atr_multiplier = 3.0

[[exit_rules]]
type = "SD_TARGET"
[exit_rules.params]
sd_level = 2.0

[[exit_rules]]
type = "STEP_STOP"
[exit_rules.params]
min_hold_bars = 3

[[exit_rules]]
type = "STAGNATION_EXIT"
[exit_rules.params]
minutes = 45
sd_threshold = 1.0
profit_gate_pct = 0.005

[[exit_rules]]
type = "EOD_FLATTEN"
[exit_rules.params]
minutes_before_close = 5

[[exit_rules]]
type = "MAX_LOSS"
[exit_rules.params]
pct = 0.025
