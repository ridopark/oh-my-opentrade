schema_version = 2

[strategy]
id = "avwap_v2"
version = "2.0.0"
name = "AVWAP Breakout/Bounce v2"
description = "Anchored VWAP strategy with volatility-adaptive exits (ATR stops, SD targets, step-stops)"
author = "system"
created_at = "2026-03-08T00:00:00Z"

[lifecycle]
state = "PaperActive"
paper_only = true

[routing]
symbols = ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "SOXL", "U", "PLTR", "SPY", "META", "NVDA"]
timeframes = ["5m"]
priority = 80
conflict_policy = "priority_wins"
exclusive_per_symbol = true
watchlist_mode = "replace"
asset_classes = ["EQUITY"]
allowed_directions = ["LONG"]

[screening]
description = "Enhanced anchored VWAP strategy with higher-lows confirmation and midday chop protection. Enters on VWAP breakouts or bounces only when price structure shows consecutive higher lows. Ideal candidates have strong morning volume, clean VWAP level respect, and moderate volatility. Avoids midday low-volume traps. Best suited for large-cap equities with institutional flow that creates reliable anchored VWAP levels."

[params]
anchors = ["pd_high", "pd_low", "on_high", "on_low", "or_high", "or_low", "session_open"]
breakout_enabled = true
hold_bars = 8
volume_mult = 1.5
bounce_enabled = true
rsi_bounce_max = 35.0
exit_hold_bars = 2
cooldown_seconds = 90
max_trades_per_day = 5
allow_regimes = ["TREND"]
asset_class = "EQUITY"
require_higher_lows = true
higher_lows_bars = 3
midday_trap_shield = false
midday_volume_mult = 2.0
stop_bps = 50
limit_offset_bps = 5
risk_per_trade_bps = 100
max_position_bps = 1000
allowed_hours_start = "09:30"
allowed_hours_end = "15:45"
allowed_hours_tz = "America/New_York"

[regime_filter]
enabled = false
allowed_regimes = ["TREND"]
min_atr_pct = 0.8

[hooks]
signals = { engine = "builtin", name = "avwap_v1" }

[dynamic_risk]
enabled = true
min_confidence = 0.70
risk_scale_min = 0.50
risk_scale_max = 1.00
stop_tight_mult = 0.70
stop_wide_mult = 1.50
size_tight_mult = 0.70
size_wide_mult = 1.20

[risk_revaluation]
enabled = true
interval_minutes = 30

[[exit_rules]]
type = "VOLATILITY_STOP"
[exit_rules.params]
atr_multiplier = 3.0

[[exit_rules]]
type = "SD_TARGET"
[exit_rules.params]
sd_level = 2.0

[[exit_rules]]
type = "STEP_STOP"
[exit_rules.params]
min_hold_bars = 3

[[exit_rules]]
type = "STAGNATION_EXIT"
[exit_rules.params]
minutes = 30
sd_threshold = 1.0
profit_gate_pct = 0.005

[[exit_rules]]
type = "EOD_FLATTEN"
[exit_rules.params]
minutes_before_close = 15

[[exit_rules]]
type = "MAX_LOSS"
[exit_rules.params]
pct = 0.03
