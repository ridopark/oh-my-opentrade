schema_version = 2

[strategy]
id = "options_ai_scalping"
version = "1.0.0"
name = "Options AI Scalping"
description = "AI-enhanced RSI/Stoch signals routed through options (buy calls on LONG, buy puts on SHORT)"
author = "system"
created_at = "2026-03-12T00:00:00Z"

[lifecycle]
state = "PaperActive"
paper_only = true

[routing]
symbols = ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "SPY", "META", "NVDA"]
timeframes = ["1m"]
priority = 60
conflict_policy = "priority_wins"
exclusive_per_symbol = false
watchlist_mode = "union"
asset_classes = ["EQUITY"]
allowed_directions = ["LONG", "SHORT"]

[screening]
description = "Options overlay on AI scalping mean-reversion strategy. Buys calls on oversold RSI/Stoch bounces, buys puts on overbought reversals. Needs large-cap underlyings with deep options liquidity. Avoid illiquid names — option spreads eat into the mean-reversion edge."

[params]
rsi_long = 30.0
rsi_short = 70.0
stoch_long = 20.0
stoch_short = 80.0
rsi_exit_mid = 50.0
allow_regimes = ["BALANCE", "REVERSAL"]
cooldown_seconds = 60
max_trades_per_day = 5
ai_enabled = true
ai_mode = "async_debate_adjust"
ai_timeout_seconds = 3
ai_min_confidence = 0.65
ai_veto_on_strong_opposite = true
size_mult_min = 0.5
size_mult_base = 1.0
size_mult_max = 1.5
stop_bps = 50
limit_offset_bps = 5
risk_per_trade_bps = 280
max_position_bps = 500
allowed_hours_start = "09:30"
allowed_hours_end = "16:00"
allowed_hours_tz = "America/New_York"

[regime_filter]
enabled = true
allowed_regimes = ["BALANCE", "REVERSAL"]
min_atr_pct = 0.8

[hooks]
signals = { engine = "builtin", name = "ai_scalping_v1" }

[options]
enabled = true

[options.defaults]
min_dte = 14
max_dte = 45
target_delta_low = 0.40
target_delta_high = 0.55
min_open_interest = 100
max_spread_pct = 0.09
max_iv = 1.0

[options.regime_overrides.BALANCE]
target_delta_low = 0.30
target_delta_high = 0.45
min_dte = 30
max_dte = 50

[dynamic_risk]
enabled = true
min_confidence = 0.70
risk_scale_min = 0.50
risk_scale_max = 0.90
stop_tight_mult = 0.80
stop_wide_mult = 1.30
size_tight_mult = 0.60
size_wide_mult = 1.00

[[exit_rules]]
type = "MAX_LOSS"
[exit_rules.params]
pct = 0.50

[[exit_rules]]
type = "PROFIT_TARGET"
[exit_rules.params]
pct = 1.00

[[exit_rules]]
type = "DTE_FLOOR"
[exit_rules.params]
dte = 7

[[exit_rules]]
type = "EXPIRY_WATCH"
[exit_rules.params]
pct_elapsed = 0.50

[[exit_rules]]
type = "EOD_FLATTEN"
[exit_rules.params]
minutes_before_close = 5
