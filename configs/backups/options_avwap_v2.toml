schema_version = 2

[strategy]
id = "options_avwap_v2"
version = "1.0.0"
name = "Options AVWAP Breakout/Bounce"
description = "AVWAP breakout/bounce signals routed through options (buy calls on LONG, buy puts on SHORT)"
author = "system"
created_at = "2026-03-12T00:00:00Z"

[lifecycle]
state = "Deactivated"
paper_only = true

[routing]
symbols = ["AAPL", "MSFT", "GOOGL", "AMZN", "TSLA", "SPY", "META", "NVDA"]
timeframes = ["1m"]
priority = 80
conflict_policy = "priority_wins"
exclusive_per_symbol = false
watchlist_mode = "replace"
asset_classes = ["EQUITY"]
allowed_directions = ["LONG", "SHORT"]

[screening]
description = "Options overlay on AVWAP breakout/bounce strategy. Buys calls on bullish VWAP breakouts, buys puts on bearish breakdowns. Needs highly liquid underlyings with active options chains — large-cap only, minimum 1000 open interest on target strikes. Avoid low-volume names where option spreads are wide."

[params]
anchors = ["pd_high", "pd_low", "on_high", "on_low", "or_high", "or_low", "session_open"]
breakout_enabled = true
hold_bars = 3
volume_mult = 2.0
bounce_enabled = true
rsi_bounce_max = 30.0
exit_hold_bars = 2
cooldown_seconds = 120
max_trades_per_day = 3
allow_regimes = ["BALANCE", "REVERSAL"]
asset_class = "EQUITY"
require_higher_lows = true
higher_lows_bars = 3
midday_trap_shield = true
midday_volume_mult = 2.0
stop_bps = 50
limit_offset_bps = 5
risk_per_trade_bps = 280
max_position_bps = 500

[regime_filter]
enabled = false
allowed_regimes = ["BALANCE", "REVERSAL"]
min_atr_pct = 0.8

[hooks]
signals = { engine = "builtin", name = "avwap_v1" }

[options]
enabled = true

[options.defaults]
min_dte = 35
max_dte = 45
target_delta_low = 0.40
target_delta_high = 0.55
min_open_interest = 100
max_spread_pct = 0.10
max_iv = 1.0

[options.regime_overrides.BALANCE]
target_delta_low = 0.30
target_delta_high = 0.45
min_dte = 30
max_dte = 50

[dynamic_risk]
enabled = true
min_confidence = 0.70
risk_scale_min = 0.50
risk_scale_max = 1.00
stop_tight_mult = 0.70
stop_wide_mult = 1.50
size_tight_mult = 0.70
size_wide_mult = 1.20

[[exit_rules]]
type = "MAX_LOSS"
[exit_rules.params]
pct = 0.50

[[exit_rules]]
type = "PROFIT_TARGET"
[exit_rules.params]
pct = 1.00

[[exit_rules]]
type = "DTE_FLOOR"
[exit_rules.params]
dte = 7

[[exit_rules]]
type = "EXPIRY_WATCH"
[exit_rules.params]
pct_elapsed = 0.50

[[exit_rules]]
type = "EOD_FLATTEN"
[exit_rules.params]
minutes_before_close = 5
