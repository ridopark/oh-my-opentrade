name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  GO_VERSION: '1.25'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: backend

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Run unit tests
        run: cd backend && go test -race -count=1 ./...

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: opentrade
          POSTGRES_PASSWORD: opentrade
          POSTGRES_DB: opentrade_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opentrade -d opentrade_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Run migrations
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: opentrade
          PGDATABASE: opentrade_test
          PGPASSWORD: opentrade
        run: ./scripts/migrate.sh migrations

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgres://opentrade:opentrade@localhost:5432/opentrade_test?sslmode=disable
        run: cd backend && go test -tags integration -race -count=1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Build binary
        run: cd backend && go build -o bin/omo-core ./cmd/omo-core

  deploy:
    name: Deploy to OCI
    runs-on: ubuntu-latest
    needs: [lint, test, test-integration, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          APCA_API_BASE_URL: ${{ secrets.APCA_API_BASE_URL }}
          APCA_DATA_API_KEY_ID: ${{ secrets.APCA_DATA_API_KEY_ID }}
          APCA_DATA_API_SECRET_KEY: ${{ secrets.APCA_DATA_API_SECRET_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          TIMESCALEDB_PASSWORD: ${{ secrets.TIMESCALEDB_PASSWORD }}
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: APCA_API_KEY_ID,APCA_API_SECRET_KEY,APCA_API_BASE_URL,APCA_DATA_API_KEY_ID,APCA_DATA_API_SECRET_KEY,DISCORD_WEBHOOK_URL,LLM_API_KEY,TIMESCALEDB_PASSWORD
          script: |
            set -e
            cd ~/oh-my-opentrade
            git fetch origin main
            git reset --hard origin/main
            git clean -fd deployments/

            # Generate .env from GitHub secrets + defaults
            cat > .env <<EOF
            # Alpaca API
            APCA_API_KEY_ID=${APCA_API_KEY_ID}
            APCA_API_SECRET_KEY=${APCA_API_SECRET_KEY}
            APCA_API_BASE_URL=${APCA_API_BASE_URL}
            APCA_DATA_API_KEY_ID=${APCA_DATA_API_KEY_ID}
            APCA_DATA_API_SECRET_KEY=${APCA_DATA_API_SECRET_KEY}

            # TimescaleDB
            TIMESCALEDB_HOST=localhost
            TIMESCALEDB_PORT=5432
            TIMESCALEDB_USER=opentrade
            TIMESCALEDB_PASSWORD=${TIMESCALEDB_PASSWORD}
            TIMESCALEDB_NAME=opentrade

            # Notifications
            DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}

            # LLM
            LLM_ENABLED=true
            LLM_BASE_URL=https://openrouter.ai/api
            LLM_MODEL=anthropic/claude-sonnet-4
            LLM_MIN_CONFIDENCE=0.6
            LLM_API_KEY=${LLM_API_KEY}
            EOF
            chmod 600 .env

            docker compose -f deployments/docker-compose.yml up -d --build --remove-orphans
            sleep 15
            docker compose -f deployments/docker-compose.yml ps --format json | python3 -c "
            import json, sys
            lines = sys.stdin.read().strip().split('\n')
            failed = []
            for line in lines:
                c = json.loads(line)
                if c.get('State') != 'running' and c.get('Name') not in ('omo-migrate',):
                    failed.append(f\"{c['Name']}: {c['State']}\")
            if failed:
                print('DEPLOY FAILED - containers not running:')
                for f in failed: print(f'  {f}')
                sys.exit(1)
            print('All containers healthy')
            "
            docker compose -f deployments/docker-compose.yml logs --tail=20 omo-core
