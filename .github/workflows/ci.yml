name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  GO_VERSION: '1.24'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Run go vet
        run: cd backend && go vet ./...

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Run unit tests
        run: cd backend && go test -race -count=1 ./...

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: opentrade
          POSTGRES_PASSWORD: opentrade
          POSTGRES_DB: opentrade_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opentrade -d opentrade_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Run migrations
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: opentrade
          PGDATABASE: opentrade_test
          PGPASSWORD: opentrade
        run: ./scripts/migrate.sh migrations

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgres://opentrade:opentrade@localhost:5432/opentrade_test?sslmode=disable
        run: cd backend && go test -tags integration -race -count=1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Build binary
        run: cd backend && go build -o bin/omo-core ./cmd/omo-core
