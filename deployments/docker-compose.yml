services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: omo-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: opentrade
      POSTGRES_PASSWORD: ${TIMESCALEDB_PASSWORD:-changeme}
      POSTGRES_DB: opentrade
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      # Note: Migrations must be run manually (e.g., via `make migrate` or psql)
      # Do NOT mount them to /docker-entrypoint-initdb.d as it runs .down.sql files too.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opentrade -d opentrade"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: postgres:16-alpine
    container_name: omo-migrate
    restart: "no"
    depends_on:
      timescaledb:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      PGHOST: timescaledb
      PGPORT: "5432"
      PGUSER: opentrade
      PGPASSWORD: ${TIMESCALEDB_PASSWORD:-changeme}
      PGDATABASE: opentrade
    volumes:
      - ../migrations:/migrations:ro
      - ../scripts/migrate.sh:/migrate.sh:ro
    command: ["/bin/sh", "/migrate.sh", "/migrations"]


  omo-core:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: omo-core
    restart: unless-stopped
    stop_grace_period: 10s  # Give WebSocket close frame time to reach Alpaca before SIGKILL
    depends_on:
      timescaledb:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - ../.env
    volumes:
      - ../configs:/configs:ro
      - ../migrations:/migrations:ro
    environment:
      - TIMESCALEDB_HOST=timescaledb
      - TIMESCALEDB_PORT=5432
      - STRATEGY_V2=true
    ports:
      - "8080:8080"
    networks:
      - default
  dashboard:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.dashboard
    container_name: omo-dashboard
    restart: unless-stopped
    depends_on:
      - omo-core
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://omo-core:8080
    networks:
      - default

  caddy:
    image: caddy:2-alpine
    container_name: omo-caddy
    restart: unless-stopped
    depends_on:
      - dashboard
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - default

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: omo-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    networks:
      - default

  grafana:
    image: grafana/grafana:10.4.2
    container_name: omo-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    ports:
      - "3001:3000"
    networks:
      - default

volumes:
  timescaledb_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
