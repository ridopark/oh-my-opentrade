groups:
  - name: omo-trading
    rules:
      - alert: CircuitBreakerActive
        expr: omo_risk_circuit_breaker_active == 1
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker is active — trading halted"
          description: "The daily loss circuit breaker has tripped. All new order execution is blocked."

      - alert: CryptoWebSocketDisconnected
        expr: omo_ws_connected{feed="crypto"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Crypto WebSocket disconnected for >30s"
          description: "Alpaca crypto market data WebSocket (24/7) has been disconnected for more than 30 seconds."

      - alert: EquityWebSocketDisconnected
        expr: >
          omo_ws_connected{feed="sip"} == 0
          and on()
          (
            (hour() * 60 + minute() >= 810 and hour() * 60 + minute() < 1260)
            and
            (day_of_week() >= 1 and day_of_week() <= 5)
          )
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Equity WebSocket disconnected during market hours"
          description: "Alpaca equity (SIP) WebSocket has been disconnected for more than 30 seconds during market hours."

      - alert: NoBarsReceived
        expr: >
          rate(omo_bars_received_total[5m]) == 0
          and on()
          (
            (hour() * 60 + minute() >= 810 and hour() * 60 + minute() < 1260)
            and
            (day_of_week() >= 1 and day_of_week() <= 5)
          )
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No bars received in 5 minutes"
          description: "The ingestion service has not received any market data bars in the last 5 minutes during market hours."

      - alert: HighOrderRejectRate
        expr: rate(omo_order_rejects_total[10m]) / (rate(omo_orders_total[10m]) + 1e-10) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Order reject rate >5%"
          description: "More than 5% of orders have been rejected over the last 10 minutes."

      - alert: HTTP5xxElevated
        expr: rate(omo_http_requests_total{code=~"5.."}[5m]) / (rate(omo_http_requests_total[5m]) + 1e-10) > 0.02
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HTTP 5xx error rate >2%"
          description: "More than 2% of HTTP requests are returning 5xx status codes."
