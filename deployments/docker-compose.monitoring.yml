# Local-dev monitoring stack.
# Requires HOST_IP env var (set automatically by scripts/start.sh).
#
# Usage:
#   HOST_IP=$(hostname -I | awk '{print $1}') docker compose -f deployments/docker-compose.monitoring.yml up -d
#   # or just: ./scripts/start.sh  (auto-starts monitoring)

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: omo-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: opentrade
      POSTGRES_PASSWORD: ${TIMESCALEDB_PASSWORD:-changeme}
      POSTGRES_DB: opentrade
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opentrade -d opentrade"]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: omo-prometheus
    restart: unless-stopped
    extra_hosts:
      - "omo-host:${HOST_IP}"
    volumes:
      - ./monitoring/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:3.4.3
    container_name: omo-loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  fluent-bit:
    image: fluent/fluent-bit:4.0
    container_name: omo-fluent-bit
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ./monitoring/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ../logs:/var/log/omo-core:ro
    command: /fluent-bit/bin/fluent-bit -c /fluent-bit/etc/fluent-bit.conf

  grafana:
    image: grafana/grafana:10.4.2
    container_name: omo-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    ports:
      - "3001:3000"

volumes:
  timescaledb_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
